# deployment.yaml
# Runs your Finance AI container on Kubernetes
# Yahoo context: same pattern used for Qwen model serving on GKE

apiVersion: apps/v1
kind: Deployment
metadata:
  name: finance-ai-api
  labels:
    app: finance-ai-api
spec:
  replicas: 3          # 3 instances for high availability
  selector:
    matchLabels:
      app: finance-ai-api
  template:
    metadata:
      labels:
        app: finance-ai-api
    spec:
      containers:
      - name: finance-ai-api
        image: gcr.io/mlops-lab-prassadh-2026/finance-ai-model:latest
        ports:
        - containerPort: 8000
        env:
        - name: ANTHROPIC_API_KEY
          valueFrom:
            secretKeyRef:
              name: finance-ai-secrets
              key: anthropic-api-key
        - name: LANGCHAIN_API_KEY
          valueFrom:
            secretKeyRef:
              name: finance-ai-secrets
              key: langchain-api-key
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 5
# hpa.yaml
# Horizontal Pod Autoscaler
# Yahoo context: closed loop concurrency control
# Automatically scales pods based on CPU usage

apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: finance-ai-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: finance-ai-api
  minReplicas: 2      # always keep 2 running (no cold start)
  maxReplicas: 10     # scale up to 10 under load
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70   # scale up when CPU > 70%
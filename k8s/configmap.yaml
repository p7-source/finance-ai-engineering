# configmap.yaml
# Non-sensitive configuration
# Secrets go in Kubernetes Secrets, not here

apiVersion: v1
kind: ConfigMap
metadata:
  name: finance-ai-config
data:
  LANGCHAIN_TRACING_V2: "true"
  LANGCHAIN_PROJECT: "finance-prod"
  LOG_LEVEL: "INFO"
  MAX_TOKENS: "300"
  DEFAULT_MODEL: "claude-haiku-4-5"